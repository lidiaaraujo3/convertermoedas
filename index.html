<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow p-4 caixa-conversor">
            <h2 class="text-center mb-4">Conversor de Moedas</h2>

            <div class="mb-3">
                <label for="valor" class="form-label">Valor em Real (R$)</label>
                <input type="number" id="valor" class="form-control" placeholder="Digite o valor">
            </div>

            <div class="mb-3">
                <label for="moeda" class="form-label">Escolha a moeda</label>
                <select id="moeda" class="form-select">
                    <option value="USD">Dólar (USD)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="GBP">Libra (GBP)</option>
                </select>
            </div>

            <button class="btn btn-primary w-100" onclick="converter()">
                Converter
            </button>

            <div id="resultado" class="alert alert-light mt-3 text-center">
                Resultado aparecerá aqui
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
